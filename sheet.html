<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記入式シート | ロジカルシンキング フレームワーク集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* デモ専用：レイアウト切替セグメント（エンジンのツールバーとは別物） */
    .sheet-demo-toggle {
      max-width: 720px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--color-text-muted);
      flex-wrap: wrap;
    }
    .sheet-demo-toggle .demo-label { font-weight: 700; }
    .sheet-demo-seg {
      display: inline-flex;
      border: 1.5px solid var(--color-primary);
      border-radius: 999px;
      overflow: hidden;
    }
    .sheet-demo-seg button {
      font-family: var(--font-main);
      font-size: 13px;
      font-weight: 700;
      padding: 6px 14px;
      border: none;
      background: var(--color-white);
      color: var(--color-primary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .sheet-demo-seg button.is-active {
      background: var(--color-primary);
      color: var(--color-white);
    }
  </style>
</head>
<body>

  <!-- デモ専用：レイアウト切替（エンジン外のUI） -->
  <div class="sheet-demo-toggle">
    <span class="demo-label">デモ切替：</span>
    <span class="sheet-demo-seg">
      <button id="demo-row" class="is-active">表形式（row）</button>
      <button id="demo-stack">カード（stack）</button>
      <button id="demo-grid">2×2グリッド</button>
    </span>
    <span>（レイアウトはデータ側の layout で決まります）</span>
  </div>

  <!-- シートを描画するコンテナ -->
  <div id="sheet-container"></div>

  <!-- 操作ガイド -->
  <div class="lf-hint">
    <span>記入欄はクリックしてそのまま入力（複数行可）</span>
    <span>見出し／項目名はダブルクリックで編集</span>
    <span>2×2グリッドは各セルの「＋項目を追加」で項目を増やす</span>
    <span>項目を選択してDeleteキー／削除ボタン／✕で削除</span>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/engines/sheet.js"></script>
  <script>
    // 「5W1H分析シート」（row/stack 共用）の初期データ。
    // layout を "stack" にするとカード形式になる。
    // ※ この定数は初期データ。SheetEngine 側は参照せず、リセットは内部保持のconfigを使う。
    const DEFAULT_SHEET_CONFIG = {
      id: "5w1h-sample",
      type: "sheet",
      title: "5W1H分析シート",
      layout: "row",
      fields: [
        { id: "f1", label: "When（いつ）",      value: "" },
        { id: "f2", label: "Where（どこで）",    value: "" },
        { id: "f3", label: "Who（誰が）",        value: "" },
        { id: "f4", label: "What（何を）",       value: "" },
        { id: "f5", label: "Why（なぜ）",        value: "" },
        { id: "f6", label: "How（どのように）",   value: "" }
      ]
    };

    // 「ジョハリの窓」（grid2x2）の初期データ。id が別なので保存も別々。
    // cells は4要素固定（tl=左上/tr=右上/bl=左下/br=右下）。初期は items 空。
    const DEFAULT_SHEET_GRID_CONFIG = {
      id: "johari-window",
      type: "sheet",
      title: "ジョハリの窓",
      layout: "grid2x2",
      cells: [
        { id: "tl", label: "開放の窓（自分も他人も知っている）", items: [] },
        { id: "tr", label: "盲点の窓（自分は気づかず他人は知る）", items: [] },
        { id: "bl", label: "秘密の窓（自分は知り他人は知らない）", items: [] },
        { id: "br", label: "未知の窓（自分も他人も知らない）", items: [] }
      ]
    };

    let engine = null;

    function mountSheet(config) {
      engine = new SheetEngine(document.getElementById('sheet-container'), config);
      engine.init();
    }

    function setActive(which) {
      document.getElementById('demo-row').classList.toggle('is-active', which === 'row');
      document.getElementById('demo-stack').classList.toggle('is-active', which === 'stack');
      document.getElementById('demo-grid').classList.toggle('is-active', which === 'grid');
    }

    // row/stack は同じ config の layout を切り替えて見せる（別フレームワーク扱いにしない）
    document.getElementById('demo-row').addEventListener('click', () => {
      setActive('row');
      mountSheet(Object.assign({}, JSON.parse(JSON.stringify(DEFAULT_SHEET_CONFIG)), { layout: 'row' }));
    });
    document.getElementById('demo-stack').addEventListener('click', () => {
      setActive('stack');
      mountSheet(Object.assign({}, JSON.parse(JSON.stringify(DEFAULT_SHEET_CONFIG)), { layout: 'stack' }));
    });
    document.getElementById('demo-grid').addEventListener('click', () => {
      setActive('grid');
      mountSheet(JSON.parse(JSON.stringify(DEFAULT_SHEET_GRID_CONFIG)));
    });

    // 初期表示は従来どおり表形式（row）
    setActive('row');
    mountSheet(JSON.parse(JSON.stringify(DEFAULT_SHEET_CONFIG)));
  </script>

</body>
</html>
