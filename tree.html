<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ロジックツリー | ロジカルシンキング フレームワーク集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ツリーを描画するコンテナ -->
  <div id="tree-container"></div>

  <!-- 操作ガイド -->
  <div class="matrix-hint">
    <span>ノードにマウスを乗せると「＋子」「＋兄弟」ボタンが表示</span>
    <span>ノードをダブルクリックでテキスト編集</span>
    <span>ノードを選択してDeleteキーまたは削除ボタンで削除</span>
    <span>ルートは削除・兄弟追加の対象外</span>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/engines/tree.js"></script>
  <script>
    // 「ロジックツリー」の初期データ定義
    // direction を "vertical" にするとピラミッド（上→下）として描画される。
    // ※ この定数は初期データ。TreeEngine 側は参照せず、
    //   リセットは内部に保持した初期configを使う。
    const DEFAULT_TREE_CONFIG = {
      id: "logic-tree-sample",
      type: "tree",
      title: "ロジックツリー",
      direction: "horizontal", // "horizontal"=ロジックツリー / "vertical"=ピラミッド
      root: {
        id: "n_root",
        text: "売上を上げる",
        children: [
          {
            id: "n_1",
            text: "客数を増やす",
            children: [
              { id: "n_1_1", text: "新規顧客を増やす", children: [] },
              { id: "n_1_2", text: "リピートを増やす", children: [] }
            ]
          },
          {
            id: "n_2",
            text: "客単価を上げる",
            children: [
              { id: "n_2_1", text: "単品の価格を上げる", children: [] },
              { id: "n_2_2", text: "まとめ買いを促す", children: [] }
            ]
          }
        ]
      }
    };

    // エンジンを初期化（保存データがあれば自動復元）
    const engine = new TreeEngine(
      document.getElementById('tree-container'),
      DEFAULT_TREE_CONFIG
    );
    engine.init();
  </script>

</body>
</html>
