<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フレームワーク編集 | ロジカルシンキング フレームワーク集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ページ上部：一覧へ戻る -->
  <div class="lf-pagenav">
    <a class="lf-back" href="index.html">← 一覧へ戻る</a>
  </div>

  <!-- エンジンを描画するコンテナ -->
  <div id="view-container"></div>

  <!-- 解説・使い方（guides.json から描画。無ければ非表示のまま） -->
  <div class="lf-guide" id="view-guide" hidden></div>

  <!-- 簡易共通ガイド（型別の詳細ガイドはステップ6で） -->
  <div class="lf-hint" id="view-hint" hidden>
    <span>編集した内容は「保存」ボタンでこのブラウザに保存されます</span>
    <span>「JSONエクスポート」で内容をファイル出力できます</span>
    <span>「リセット」で初期状態に戻せます</span>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/engines/matrix.js"></script>
  <script src="js/engines/tree.js"></script>
  <script src="js/engines/flow.js"></script>
  <script src="js/engines/sheet.js"></script>
  <script src="js/engines/venn.js"></script>
  <script src="js/engines/timeline.js"></script>
  <script src="js/registry.js"></script>
  <script>
    // 案内メッセージを表示する（id無し・未発見・読み込み失敗時）
    function showMessage(html) {
      const c = document.getElementById('view-container');
      c.innerHTML = ''; // 既存内容をクリア（ユーザー入力テキストは扱わないので固定HTMLでよい）
      const box = document.createElement('div');
      box.className = 'lf-message';
      box.innerHTML = html;
      c.appendChild(box);
    }

    // 解説・使い方を描画する（guide が無ければ何もしない）
    // すべて textContent で組み立てる（innerHTML は使わない）
    function renderGuide(guide) {
      if (!guide) return;
      const root = document.getElementById('view-guide');
      if (!root) return;

      // 段落セクション（概要・使いどころ）
      function addParagraph(label, text) {
        if (typeof text !== 'string' || !text.trim()) return;
        const sec = document.createElement('section');
        sec.className = 'lf-guide-section';
        const h = document.createElement('h2');
        h.className = 'lf-guide-label';
        h.textContent = label;
        const p = document.createElement('p');
        p.className = 'lf-guide-text';
        p.textContent = text;
        sec.appendChild(h);
        sec.appendChild(p);
        root.appendChild(sec);
      }

      // 箇条書きセクション（記入のコツ・よくある誤用）
      function addList(label, items) {
        if (!Array.isArray(items) || items.length === 0) return;
        const sec = document.createElement('section');
        sec.className = 'lf-guide-section';
        const h = document.createElement('h2');
        h.className = 'lf-guide-label';
        h.textContent = label;
        const ul = document.createElement('ul');
        ul.className = 'lf-guide-list';
        items.forEach(function (item) {
          if (typeof item !== 'string' || !item.trim()) return;
          const li = document.createElement('li');
          li.textContent = item;
          ul.appendChild(li);
        });
        sec.appendChild(h);
        sec.appendChild(ul);
        root.appendChild(sec);
      }

      addParagraph('概要', guide.overview);
      addParagraph('使いどころ', guide.whenToUse);
      addList('記入のコツ', guide.tips);
      addList('よくある誤用', guide.pitfalls);

      if (root.childElementCount > 0) root.hidden = false;
    }

    (function () {
      // (2) URLパラメータは URLSearchParams で取得（自動でdecodeされる）
      const id = new URLSearchParams(location.search).get('id');
      if (!id) {
        showMessage('IDが指定されていません。<br><a href="index.html">← 一覧へ戻る</a>');
        return;
      }

      // (1) fetch は先頭スラッシュなしの相対パス（GitHub Pages のサブパス対応）
      // (3) 失敗時フォールバック：白画面で固まらせない
      // frameworks.json は必須。guides.json は付加情報で、取得失敗時は null で続行し本体描画を妨げない。
      Promise.all([
        fetch('data/frameworks.json').then((res) => {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        }),
        fetch('data/guides.json')
          .then((res) => (res.ok ? res.json() : null))
          .catch(() => null),
      ])
        .then(([list, guides]) => {
          const entry = list.find((e) => e.id === id);
          if (!entry) {
            showMessage('指定のフレームワークが見つかりませんでした。<br><a href="index.html">← 一覧へ戻る</a>');
            return;
          }
          const Engine = REGISTRY[entry.type];
          if (!Engine) {
            showMessage('未対応の種別です（type: ' + String(entry.type) + '）。<br><a href="index.html">← 一覧へ戻る</a>');
            return;
          }
          // エンジンを生成して描画
          const engine = new Engine(document.getElementById('view-container'), entry);
          engine.init();
          document.title = entry.title + ' | ロジカルシンキング フレームワーク集';
          document.getElementById('view-hint').hidden = false;
          // 解説を描画（guides 取得失敗や該当 id なしのときは何もしない）
          renderGuide(guides && guides[id]);
        })
        .catch((err) => {
          console.error('フレームワークの読み込みに失敗:', err);
          showMessage(
            'データを読み込めませんでした。<br>' +
            'ローカルで開く場合はサーバ経由（例：python -m http.server）でアクセスしてください。<br>' +
            '<a href="index.html">← 一覧へ戻る</a>'
          );
        });
    })();
  </script>

</body>
</html>
