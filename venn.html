<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ベン図 | ロジカルシンキング フレームワーク集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* デモ専用：集合数の切替セグメント（エンジンのツールバーとは別物） */
    .venn-demo-toggle {
      max-width: 720px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--color-text-muted);
    }
    .venn-demo-toggle .demo-label {
      font-weight: 700;
    }
    .venn-demo-seg {
      display: inline-flex;
      border: 1.5px solid var(--color-primary);
      border-radius: 999px;
      overflow: hidden;
    }
    .venn-demo-seg button {
      font-family: var(--font-main);
      font-size: 13px;
      font-weight: 700;
      padding: 6px 16px;
      border: none;
      background: var(--color-white);
      color: var(--color-primary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .venn-demo-seg button.is-active {
      background: var(--color-primary);
      color: var(--color-white);
    }
  </style>
</head>
<body>

  <!-- デモ専用：2集合／3集合の切替（エンジン外のUI） -->
  <div class="venn-demo-toggle">
    <span class="demo-label">デモ切替：</span>
    <span class="venn-demo-seg">
      <button id="demo-2" class="is-active">2集合</button>
      <button id="demo-3">3集合</button>
    </span>
    <span>（集合数はデータ側の sets で決まります）</span>
  </div>

  <!-- ベン図を描画するコンテナ -->
  <div id="venn-container"></div>

  <!-- 操作ガイド -->
  <div class="lf-hint">
    <span>円の上をクリックしてアイテムを追加</span>
    <span>アイテムをダブルクリックでテキスト編集</span>
    <span>アイテムをドラッグして領域間を移動</span>
    <span>アイテムを選択してDeleteキー／削除ボタン／✕で削除</span>
    <span>集合ラベルをクリックして編集</span>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/engines/venn.js"></script>
  <script>
    // 「ベン図（2集合）」の初期データ定義
    // ※ この定数は初期データ。VennEngine 側は参照せず、
    //   リセットは内部に保持した初期configを使う。
    const DEFAULT_VENN_CONFIG = {
      id: "venn-sample",
      type: "venn",
      title: "ベン図（2集合）",
      sets: [
        { id: "A", label: "集合A" },
        { id: "B", label: "集合B" }
      ],
      items: [
        { id: "i1", text: "Aだけの要素", x: 0.30, y: 0.50 },
        { id: "i2", text: "共通の要素",   x: 0.50, y: 0.50 },
        { id: "i3", text: "Bだけの要素", x: 0.70, y: 0.50 }
      ]
    };

    // 「ベン図（3集合）」の初期データ定義
    // id が2集合と別なので localStorage の保存も別々になり、互いを上書きしない。
    const DEFAULT_VENN_CONFIG_3 = {
      id: "venn-sample-3",
      type: "venn",
      title: "ベン図（3集合）",
      sets: [
        { id: "A", label: "集合A" },
        { id: "B", label: "集合B" },
        { id: "C", label: "集合C" }
      ],
      // 円配置（venn.js の angles=[-90,30,150]）により A=上 / B=右下 / C=左下。
      // 各チップを対応する領域へ配置（中心アンカー基準の0〜1相対座標）。
      items: [
        { id: "i1", text: "Aだけ",   x: 0.50, y: 0.18 },   // A単独（上の外側）
        { id: "i2", text: "Bだけ",   x: 0.78, y: 0.70 },   // B単独（右下の外側）
        { id: "i3", text: "Cだけ",   x: 0.22, y: 0.70 },   // C単独（左下の外側）
        { id: "i4", text: "A∩B",     x: 0.63, y: 0.42 },   // AとBの重なり（右上）
        { id: "i5", text: "A∩C",     x: 0.37, y: 0.42 },   // AとCの重なり（左上）
        { id: "i6", text: "B∩C",     x: 0.50, y: 0.72 },   // BとCの重なり（下中央）
        { id: "i7", text: "A∩B∩C",   x: 0.50, y: 0.50 }    // 3つの重なり（中央）
      ]
    };

    // 現在のエンジンインスタンス（切替時に作り直す）
    let engine = null;

    // 指定configでエンジンを作り直して初期化する
    function mountVenn(config) {
      engine = new VennEngine(
        document.getElementById('venn-container'),
        config
      );
      engine.init();
    }

    // セグメントのアクティブ表示を更新する
    function setActive(which) {
      document.getElementById('demo-2').classList.toggle('is-active', which === 2);
      document.getElementById('demo-3').classList.toggle('is-active', which === 3);
    }

    // 切替ボタン
    document.getElementById('demo-2').addEventListener('click', () => {
      setActive(2);
      mountVenn(DEFAULT_VENN_CONFIG);
    });
    document.getElementById('demo-3').addEventListener('click', () => {
      setActive(3);
      mountVenn(DEFAULT_VENN_CONFIG_3);
    });

    // 初期表示は従来どおり2集合
    setActive(2);
    mountVenn(DEFAULT_VENN_CONFIG);
  </script>

</body>
</html>
