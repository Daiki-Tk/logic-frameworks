<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ロジカルシンキング フレームワーク集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="lf-home">
    <header class="lf-home-header">
      <h1 class="lf-home-title">ロジカルシンキング フレームワーク集</h1>
      <p class="lf-home-lead">ビジネスで使える思考フレームワークを、実際に入力・編集・保存できるツール集です。</p>
      <input type="search" id="search" class="lf-search" placeholder="フレームワーク名で検索…" autocomplete="off">
    </header>

    <!-- 一覧（カテゴリ別カード）をここに描画 -->
    <div id="list"></div>
  </div>

  <script>
    // 一覧の状態
    let ALL_ENTRIES = [];

    // 案内メッセージを表示する
    function showMessage(html) {
      document.getElementById('list').innerHTML =
        '<div class="lf-message">' + html + '</div>';
    }

    // 与えられたエントリ配列をカテゴリ別カードとして描画する
    function renderList(entries) {
      const listEl = document.getElementById('list');
      listEl.innerHTML = '';

      if (entries.length === 0) {
        const empty = document.createElement('p');
        empty.className = 'lf-empty';
        empty.textContent = '該当するフレームワークはありません。';
        listEl.appendChild(empty);
        return;
      }

      // カテゴリ別にグルーピング（出現順を維持）
      const groups = new Map();
      entries.forEach((e) => {
        const cat = e.category || 'その他';
        if (!groups.has(cat)) groups.set(cat, []);
        groups.get(cat).push(e);
      });

      groups.forEach((items, cat) => {
        const section = document.createElement('section');
        section.className = 'lf-cat';

        const h = document.createElement('h2');
        h.className = 'lf-cat-title';
        h.textContent = cat; // textContent のみ（XSS対策）
        section.appendChild(h);

        const cards = document.createElement('div');
        cards.className = 'lf-cards';

        items.forEach((e) => {
          const card = document.createElement('a');
          card.className = 'lf-card';
          // id は encodeURIComponent を通す
          card.href = 'view.html?id=' + encodeURIComponent(e.id);

          const title = document.createElement('div');
          title.className = 'lf-card-title';
          title.textContent = e.title;
          card.appendChild(title);

          const catLabel = document.createElement('div');
          catLabel.className = 'lf-card-cat';
          catLabel.textContent = e.category || '';
          card.appendChild(catLabel);

          cards.appendChild(card);
        });

        section.appendChild(cards);
        listEl.appendChild(section);
      });
    }

    // 簡易検索：タイトルの部分一致で絞り込む
    function applyFilter(keyword) {
      const kw = keyword.trim().toLowerCase();
      if (!kw) {
        renderList(ALL_ENTRIES);
        return;
      }
      const filtered = ALL_ENTRIES.filter((e) =>
        (e.title || '').toLowerCase().includes(kw)
      );
      renderList(filtered);
    }

    // 初期化：frameworks.json を fetch（相対パス）→ 一覧描画
    (function () {
      fetch('data/frameworks.json')
        .then((res) => {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then((list) => {
          ALL_ENTRIES = Array.isArray(list) ? list : [];
          renderList(ALL_ENTRIES);

          // 検索入力で絞り込み
          document.getElementById('search').addEventListener('input', (e) => {
            applyFilter(e.target.value);
          });
        })
        .catch((err) => {
          console.error('一覧の読み込みに失敗:', err);
          showMessage(
            'データを読み込めませんでした。<br>' +
            'ローカルで開く場合はサーバ経由（例：python -m http.server）でアクセスしてください。'
          );
        });
    })();
  </script>

</body>
</html>
